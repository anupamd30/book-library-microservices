name: Build and deploy ApiGateway

on:
push:
paths:
- 'ApiGateway/**'
- '.github/workflows/apigateway.yml'

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
- uses: actions/checkout@v4

- name: Setup .NET
  uses: actions/setup-dotnet@v4
  with:
    dotnet-version: '10.0.x'

- name: Restore
  run: dotnet restore ApiGateway/ApiGateway.csproj

- name: Build
  run: dotnet build ApiGateway/ApiGateway.csproj --configuration Release

- name: Publish
  run: dotnet publish ApiGateway/ApiGateway.csproj -c Release -o publish

- name: Deploy to Azure
  uses: azure/webapps-deploy@v3
  with:
    app-name: 'api-gateway'
    publish-profile: ${{ secrets.APIGATEWAY_PUBLISH_PROFILE }}
    package: publish
```
