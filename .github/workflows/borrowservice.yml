name Build and deploy BorrowService

on
push
paths
- 'BorrowService'
- '.githubworkflowsborrowservice.yml'

jobs
build-and-deploy
runs-on ubuntu-latest

```
steps
- uses actionscheckout@v4

- name Setup .NET
  uses actionssetup-dotnet@v4
  with
    dotnet-version '10.0.x'

- name Restore
  run dotnet restore BorrowServiceBorrowService.csproj

- name Build
  run dotnet build BorrowServiceBorrowService.csproj --configuration Release

- name Publish
  run dotnet publish BorrowServiceBorrowService.csproj -c Release -o publish

- name Deploy to Azure
  uses azurewebapps-deploy@v3
  with
    app-name 'borrow-service'
    publish-profile ${{ secrets.BORROWSERVICE_PUBLISH_PROFILE }}
    package publish
```
